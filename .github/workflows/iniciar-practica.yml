name: Iniciar práctica

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  crear-issues-iniciales:
    name: Crear primera misión
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Crear issues iniciales
        run: npm run create:initial-issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
